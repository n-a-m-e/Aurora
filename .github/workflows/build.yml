name: bluebuild

on:
  push:
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  image-changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.changes.outputs.server }}
      client: ${{ steps.changes.outputs.client }}
      thinclient: ${{ steps.changes.outputs.thinclient }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            server:
              - 'files/scripts/server/**'
              - 'files/scripts/shared/**'
              - 'recipes/recipe-server.yml'
              - '.github/workflows/build.yml'

            client:
              - 'files/scripts/client/**'
              - 'files/scripts/shared/**'
              - 'recipes/recipe-client.yml'
              - '.github/workflows/build.yml'

            thinclient:
              - 'files/scripts/thinclient/**'
              - 'recipes/recipe-thinclient.yml'
              - '.github/workflows/build.yml'

  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: github.ref == 'refs/heads/main' && needs.image-changes.outputs.server == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Server Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-server.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  build-client:
    name: Build Client Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: github.ref == 'refs/heads/main' && needs.image-changes.outputs.client == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Client Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-client.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  build-thinclient:
    name: Build Thinclient Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: github.ref == 'refs/heads/main' && needs.image-changes.outputs.thinclient == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Thinclient Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-thinclient.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  thinclient-iso:
    name: Build Thinclient ISO and publish Release
    runs-on: ubuntu-24.04
    needs: [image-changes, build-thinclient]
    if: github.ref == 'refs/heads/main' && needs.image-changes.outputs.thinclient == 'true'
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Write ISO config
        run: |
          set -euxo pipefail
          cat > image-config.toml <<'EOF'
          [customizations]
          EOF
          echo "=== image-config.toml ==="
          cat image-config.toml

      - name: Build ISO
        id: iso
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./image-config.toml
          image: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
          types: iso
          rootfs: xfs
          additional-args: --use-librepo=True

      - name: Rename ISO
        run: |
          set -euxo pipefail
          echo "=== output directory contents before rename ==="
          sudo find "${{ steps.iso.outputs.output-directory }}" -maxdepth 3 -type f -ls

          iso=$(sudo find "${{ steps.iso.outputs.output-directory }}" -name '*.iso' | head -n1)
          echo "ISO found at: $iso"

          sudo cp "$iso" "${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso"
          sudo chown "$(id -u):$(id -g)" "${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso"

          echo "=== iso size before compression ==="
          ls -lh "${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso"
          stat "${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso"

      - name: Install zstd
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Compress ISO with zstd
        run: |
          set -euxo pipefail
          ISO="${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso"

          echo "=== before compression ==="
          ls -lh "$ISO"
          stat "$ISO"

          sudo zstd -T0 -19 --rm "$ISO"
          sudo chown "$(id -u):$(id -g)" "${ISO}.zst"

          echo "=== after compression ==="
          ls -lh "${ISO}.zst"
          stat "${ISO}.zst"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-iso-latest
          name: Aurora Thinclient ISO
          prerelease: true
          files: ${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso.zst
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest compressed ISO image for Aurora Thinclient.

            Decompress with:
            zstd -d aurora-thinclient-latest.iso.zst

            Then write or open the ISO as needed.
