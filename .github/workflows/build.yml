name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build-server-client:
    name: Build Server and Client Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-server.yml
          - recipe-client.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
  thinclient-changes:
    name: Detect Thinclient Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      thinclient: ${{ steps.changes.outputs.thinclient }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            thinclient:
              - 'recipes/recipe-thinclient.yml'
              - 'files/scripts/thinclient-setup.sh'
              - '.github/workflows/build.yml'
  build-thinclient:
    name: Build Thinclient Image
    runs-on: ubuntu-latest
    needs: thinclient-changes
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || needs.thinclient-changes.outputs.thinclient == 'true')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Thinclient Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-thinclient.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
  thinclient-raw:
    name: Build Thinclient RAW and publish Release
    runs-on: ubuntu-24.04
    needs: [thinclient-changes, build-thinclient]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || needs.thinclient-changes.outputs.thinclient == 'true')
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Write RAW config
        run: |
          cat > image-config.toml <<'EOF'
          [customizations]
          EOF
      - name: Build RAW
        id: raw
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./image-config.toml
          image: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
          types: raw
          rootfs: ext4
          additional-args: --use-librepo=True
      - name: Rename RAW
        run: |
          raw=$(sudo find "${{ steps.raw.outputs.output-directory }}" -name '*.raw' | head -n1)
          sudo cp "$raw" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          sudo chown "$(id -u):$(id -g)" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
      - name: Shrink RAW
        run: |
          RAW="${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          LOOP=$(sudo losetup --find --show --partscan "$RAW")
          echo "Loop device: $LOOP"
          sudo e2fsck -fy "${LOOP}p4"
          sudo resize2fs -M "${LOOP}p4"
          BLOCKS=$(sudo resize2fs -P "${LOOP}p4" 2>/dev/null | awk -F: '{gsub(/ /,"",$2); print $2}')
          START=$(sudo parted -sm "$LOOP" unit s print | awk -F: '$1=="4"{gsub("s","",$2); print $2}')
          NEW_END=$((START + BLOCKS * 8 + 2047))
          printf 'resizepart\n4\nYes\n%ss\nquit\n' "$NEW_END" | sudo parted "$LOOP" ---pretend-input-tty
          sudo partprobe "$LOOP"
          sudo losetup -d "$LOOP"
          NEW_SIZE=$(( (NEW_END + 1) * 512 ))
          truncate -s "$NEW_SIZE" "$RAW"
      - name: Install gdisk
        run: |
          sudo apt-get update
          sudo apt-get install -y gdisk
      - name: Fix GPT after shrink
        run: |
          sudo sgdisk -e "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
      - name: Compress RAW
        run: |
          sudo xz -T0 -z "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          sudo chown "$(id -u):$(id -g)" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw.xz"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-raw-latest
          name: Aurora Thinclient RAW
          prerelease: true
          files: ${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw.xz
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest compressed RAW disk image for Aurora Thinclient.
            Write to USB with:
            xz -dc aurora-thinclient-latest.raw.xz | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync
