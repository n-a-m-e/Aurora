name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-server.yml
          - recipe-thinclient.yml
          - recipe-client.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
  thinclient-iso:
    name: Build Thinclient ISO and publish Release
    runs-on: ubuntu-24.04
    needs: bluebuild
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: read
    steps:
      - name: Build ISO
        id: iso
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          image: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
          types: iso
          rootfs: xfs
          additional-args: --use-librepo=True
      - name: Rename ISO
        run: |
          iso=$(find "${{ steps.iso.outputs.output-directory }}" -name '*.iso' | head -n1)
          mv "$iso" "${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-iso-latest
          name: Aurora Thinclient ISO
          prerelease: true
          files: ${{ steps.iso.outputs.output-directory }}/aurora-thinclient-latest.iso
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest bootable installer ISO for Aurora Thinclient.
