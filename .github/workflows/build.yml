name: bluebuild

on:
  #schedule:
  #  - cron: "00 06 * * *"
  #push:
  #  paths-ignore:
  #    - "**.md"
  #pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-server-client:
    name: Build Server and Client Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-server.yml
          - recipe-client.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  thinclient-changes:
    name: Detect Thinclient Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      thinclient: ${{ steps.changes.outputs.thinclient }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            thinclient:
              - 'recipes/recipe-thinclient.yml'
              - 'files/scripts/thinclient-setup.sh'
              - '.github/workflows/build.yml'

  build-thinclient:
    name: Build Thinclient Image
    runs-on: ubuntu-latest
    needs: thinclient-changes
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || needs.thinclient-changes.outputs.thinclient == 'true')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Thinclient Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-thinclient.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  thinclient-raw:
    name: Build Thinclient RAW and publish Release
    runs-on: ubuntu-24.04
    needs: [thinclient-changes, build-thinclient]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || needs.thinclient-changes.outputs.thinclient == 'true')
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shrink tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y gdisk e2fsprogs

      - name: Write RAW config
        run: |
          set -euxo pipefail
          cat > image-config.toml <<'EOF'
          [customizations]
          EOF
          echo "=== image-config.toml ==="
          cat image-config.toml

      - name: Build RAW
        id: raw
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./image-config.toml
          image: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
          types: raw
          rootfs: ext4
          additional-args: --use-librepo=True

      - name: Rename RAW
        run: |
          set -euxo pipefail
          echo "=== output directory contents before rename ==="
          sudo find "${{ steps.raw.outputs.output-directory }}" -maxdepth 3 -type f -ls

          raw=$(sudo find "${{ steps.raw.outputs.output-directory }}" -name '*.raw' | head -n1)
          echo "RAW found at: $raw"

          sudo cp "$raw" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          sudo chown "$(id -u):$(id -g)" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"

          echo "=== raw image size before shrink ==="
          ls -lh "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          stat "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"

          echo "=== partition table before shrink ==="
          sudo fdisk -l "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw" || true

      - name: Shrink RAW
        run: |
          set -euxo pipefail

          RAW="${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"

          echo "=== attaching loop device ==="
          LOOP=$(sudo losetup --find --show --partscan "$RAW")
          echo "Loop device: $LOOP"

          echo "=== loop partitions before shrink ==="
          lsblk "$LOOP"
          sudo fdisk -l "$LOOP" || true
          sudo sgdisk -p "$LOOP" || true

          echo "=== ext4 filesystem check ==="
          sudo e2fsck -fy "${LOOP}p4"

          echo "=== ext4 details before resize ==="
          sudo dumpe2fs -h "${LOOP}p4" 2>/dev/null | egrep 'Block count:|Block size:|Filesystem state:|Free blocks:|Free inodes:' || true

          echo "=== resizing ext4 to minimum ==="
          sudo resize2fs -M "${LOOP}p4"

          echo "=== ext4 details after resize ==="
          sudo dumpe2fs -h "${LOOP}p4" 2>/dev/null | egrep 'Block count:|Block size:|Filesystem state:|Free blocks:|Free inodes:' || true

          BLOCK_COUNT=$(sudo dumpe2fs -h "${LOOP}p4" 2>/dev/null | awk -F: '/Block count:/ {gsub(/ /,"",$2); print $2}')
          BLOCK_SIZE=$(sudo dumpe2fs -h "${LOOP}p4" 2>/dev/null | awk -F: '/Block size:/ {gsub(/ /,"",$2); print $2}')
          START=$(sudo sgdisk -i 4 "$LOOP" | awk -F: '/First sector:/ {print $2}' | awk '{print $1}')

          FS_SECTORS=$(( BLOCK_COUNT * BLOCK_SIZE / 512 ))
          NEW_END=$(( START + FS_SECTORS - 1 ))

          echo "=== calculated shrink values ==="
          echo "BLOCK_COUNT=$BLOCK_COUNT"
          echo "BLOCK_SIZE=$BLOCK_SIZE"
          echo "START=$START"
          echo "FS_SECTORS=$FS_SECTORS"
          echo "NEW_END=$NEW_END"

          echo "=== detaching loop before GPT rewrite ==="
          sudo losetup -d "$LOOP"

          echo "=== GPT before delete/recreate partition 4 ==="
          sudo sgdisk -p "$RAW" || true

          echo "=== recreating partition 4 to exact filesystem size ==="
          sudo sgdisk -d 4 -n 4:${START}:${NEW_END} -t 4:8300 "$RAW"

          echo "=== GPT after recreate before truncate ==="
          sudo sgdisk -p "$RAW" || true

          GPT_SLACK_SECTORS=4096
          NEW_LAST_SECTOR=$(( NEW_END + GPT_SLACK_SECTORS ))
          NEW_SIZE=$(( (NEW_LAST_SECTOR + 1) * 512 ))

          echo "GPT_SLACK_SECTORS=$GPT_SLACK_SECTORS"
          echo "NEW_LAST_SECTOR=$NEW_LAST_SECTOR"
          echo "NEW_SIZE=$NEW_SIZE"

          echo "=== truncating raw file ==="
          truncate -s "$NEW_SIZE" "$RAW"

          echo "=== fixing GPT backup header ==="
          sudo sgdisk -e "$RAW"

          echo "=== validating GPT ==="
          sudo sgdisk -v "$RAW" || true
          sudo sgdisk -p "$RAW" || true
          sudo fdisk -l "$RAW" || true

          echo "=== raw image size after shrink ==="
          ls -lh "$RAW"
          stat "$RAW"

      - name: Compress RAW
        run: |
          set -euxo pipefail
          RAW="${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"

          echo "=== before compression ==="
          ls -lh "$RAW"
          stat "$RAW"

          sudo xz -T0 -z "$RAW"
          sudo chown "$(id -u):$(id -g)" "${RAW}.xz"

          echo "=== after compression ==="
          ls -lh "${RAW}.xz"
          xz --robot -l "${RAW}.xz"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-raw-latest
          name: Aurora Thinclient RAW
          prerelease: true
          files: ${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw.xz
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest compressed RAW disk image for Aurora Thinclient.

            Write to USB with:
            xz -dc aurora-thinclient-latest.raw.xz | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync
