name: bluebuild

on:
  push:
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"
  workflow_dispatch:
  schedule:
    - cron: '20 6 * * *'   # image builds
    - cron: '50 7 * * 0'   # thinclient ISO + PXE live release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  THINCLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
  ISO_RELEASE_TAG: thinclient-iso-latest
  PXE_RELEASE_TAG: thinclient-pxe-live-latest
  CHROOT_RELEASE_TAG: thinstation-chroot-latest

jobs:
  image-changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.changes.outputs.server }}
      client: ${{ steps.changes.outputs.client }}
      thinclient: ${{ steps.changes.outputs.thinclient }}
      thinstation: ${{ steps.changes.outputs.thinstation }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            server:
              - 'files/scripts/server/**'
              - 'files/scripts/shared/**'
              - 'recipes/recipe-server.yml'
              - '.github/workflows/build.yml'
            client:
              - 'files/scripts/client/**'
              - 'files/scripts/shared/**'
              - 'recipes/recipe-client.yml'
              - '.github/workflows/build.yml'
            thinclient:
              - 'files/scripts/thinclient/**'
              - 'recipes/recipe-thinclient.yml'
              - '.github/workflows/build.yml'
            thinstation:
              - 'files/scripts/thinstation/**'
              - '.github/workflows/build.yml'

  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: github.ref == 'refs/heads/main' && (github.event.schedule == '20 6 * * *' || needs.image-changes.outputs.server == 'true')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-server.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  build-client:
    name: Build Client Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: github.ref == 'refs/heads/main' && (github.event.schedule == '20 6 * * *' || needs.image-changes.outputs.client == 'true')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-client.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  build-thinclient:
    name: Build Thinclient Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: github.ref == 'refs/heads/main' && (github.event.schedule == '20 6 * * *' || needs.image-changes.outputs.thinclient == 'true')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-thinclient.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true


  thinstation-chroot:
    name: Build ThinStation Chroot Cache
    runs-on: ubuntu-24.04
    needs: image-changes
    if: always() && github.ref == 'refs/heads/main' && (github.event.schedule == '50 7 * * 0' || needs.image-changes.outputs.thinstation == 'true')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Build ThinStation chroot cache
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y podman
          sudo apt-get clean

          sudo podman run --rm --privileged \
            -v "$PWD:/workspace:Z" \
            -w /workspace \
            -e AURORA_ROOT=/workspace \
            fedora:42 \
            bash -euxo pipefail -c '
              dnf install -y git sudo tar zstd xz rsync findutils which util-linux

              chmod +x files/scripts/thinstation/*.sh

              files/scripts/thinstation/build-chroot-cache.sh
            '

      - name: Publish ThinStation Chroot Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.CHROOT_RELEASE_TAG }}
          name: ThinStation Chroot Cache
          prerelease: true
          files: |
            ./release/thinstation-chroot/thinstation-chroot.tar.zst
            ./release/thinstation-chroot/thinstation-chroot.sha256
            ./release/thinstation-chroot/THINSTATION_REF
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Prepared ThinStation source + chroot cache.

            Normal ThinStation PXE builds can download this asset and avoid running setup-chroot from scratch.

  thinclient-iso:
    name: Build Thinclient ISO
    runs-on: ubuntu-24.04
    needs: [image-changes, build-thinclient]
    if: always() && github.ref == 'refs/heads/main' && (github.event.schedule == '50 7 * * 0' || needs.image-changes.outputs.thinclient == 'true') && (github.event.schedule == '50 7 * * 0' || needs.build-thinclient.result == 'success')
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Write ISO config
        run: |
          cat > image-config.toml <<'EOF'
          [customizations.kernel]
          append = "quiet"
          EOF
          cat image-config.toml

      - name: Build ISO
        id: iso
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./image-config.toml
          image: ${{ env.THINCLIENT_IMAGE }}
          types: iso
          rootfs: xfs
          additional-args: --use-librepo=True

      - name: Make installer ISO safer
        run: |
          set -euxo pipefail

          iso="$(sudo find '${{ steps.iso.outputs.output-directory }}' -name '*.iso' | head -n1)"
          test -n "$iso"

          sudo cp "$iso" ./original.iso
          sudo chown "$(id -u):$(id -g)" ./original.iso

          sudo podman run --rm --privileged \
            -v "$PWD:/work:Z" \
            quay.io/centos/centos:stream9 \
            bash -euxo pipefail -c '
              dnf install -y lorax

              mkksiso \
                --cmdline "nomodeset" \
                --replace "set timeout=60" "set timeout=-1" \
                --replace "set timeout=10" "set timeout=-1" \
                --replace "set timeout=5" "set timeout=-1" \
                --replace "set default=\"0\"" "set default=\"2\"" \
                --replace "set default=0" "set default=2" \
                --replace "set default=\"1\"" "set default=\"2\"" \
                --replace "set default=1" "set default=2" \
                /work/original.iso \
                /work/safe.iso
            '

          sudo cp ./safe.iso "$iso"

      - name: Split ISO
        run: |
          set -euxo pipefail
          mkdir -p release
          iso="$(sudo find '${{ steps.iso.outputs.output-directory }}' -name '*.iso' | head -n1)"
          sudo cp "$iso" release/aurora-thinclient-latest.iso
          sudo chown "$(id -u):$(id -g)" release/aurora-thinclient-latest.iso

          split -b 1900M -d -a 2 release/aurora-thinclient-latest.iso release/aurora-thinclient-latest.iso.part-
          (
            cd release
            sha256sum aurora-thinclient-latest.iso.part-*
          ) > release/aurora-thinclient-latest.iso.parts.sha256
          ls -lh release/

      - name: Publish ISO Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.ISO_RELEASE_TAG }}
          name: Aurora Thinclient ISO
          prerelease: true
          files: |
            ./release/aurora-thinclient-latest.iso.part-*
            ./release/aurora-thinclient-latest.iso.parts.sha256
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest ISO image for Aurora Thinclient.

            Download, verify, and combine:
            base="https://github.com/${{ github.repository }}/releases/download/${{ env.ISO_RELEASE_TAG }}/aurora-thinclient-latest.iso"; rm -f aurora-thinclient-latest.iso aurora-thinclient-latest.iso.parts.sha256; [ -f aurora-thinclient-latest.iso.part-00 ] || wget "${base}.part-00"; [ -f aurora-thinclient-latest.iso.part-01 ] || wget "${base}.part-01"; wget "${base}.parts.sha256"; sha256sum -c aurora-thinclient-latest.iso.parts.sha256 && cat aurora-thinclient-latest.iso.part-* > aurora-thinclient-latest.iso && ls -lh aurora-thinclient-latest.iso && file aurora-thinclient-latest.iso
            
  thinclient-pxe-live:
    name: Build Thinclient Diskless PXE
    runs-on: ubuntu-24.04
    needs: [image-changes, build-thinclient]
    if: always() && github.ref == 'refs/heads/main' && (github.event.schedule == '50 7 * * 0' || needs.image-changes.outputs.thinclient == 'true') && (github.event.schedule == '50 7 * * 0' || needs.build-thinclient.result == 'success')
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman golang-go rsync jq
          sudo apt-get clean

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image-builder with bootc-generic-iso support
        run: |
          set -euxo pipefail

          git clone https://github.com/osbuild/image-builder-cli.git
          cd image-builder-cli

          git checkout 3fbf0900cf16e324f01987dc439bd156afadde73

          export GOPROXY="https://proxy.golang.org,direct"
          export GOSUMDB="sum.golang.org"
          export GOPATH="${RUNNER_TEMP}/go"
          export GOMODCACHE="${RUNNER_TEMP}/go/pkg/mod"
          export GOCACHE="${RUNNER_TEMP}/go-build"

          go mod edit -replace github.com/osbuild/images=github.com/ondrejbudai/images@bootc-generic-iso-dev

          go clean -modcache || true
          go mod tidy || {
            rm -rf "${GOMODCACHE}/cache/vcs"
            go mod tidy
          }

          sudo podman build -t image-builder-dev .

      - name: Build live container
        run: |
          sudo podman build \
            --cap-add SYS_ADMIN \
            --security-opt label=disable \
            --build-arg BASE_IMAGE="${{ env.THINCLIENT_IMAGE }}" \
            -t aurora-thinclient-live \
            files/scripts/thinclient/pxe-live

      - name: Build live ISO
        run: |
          set -euxo pipefail
          mkdir -p output

          sudo podman run --rm --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$PWD/output:/output:Z" \
            image-builder-dev \
            build \
            --output-dir /output \
            --bootc-ref localhost/aurora-thinclient-live \
            --bootc-default-fs ext4 \
            bootc-generic-iso

          sudo chown -R "$(id -u):$(id -g)" output
          find output -maxdepth 3 -type f -ls

      - name: Extract PXE files
        run: |
          set -euxo pipefail

          ISO="$(find output -name '*.iso' | head -n1)"
          test -n "$ISO"

          mkdir -p release/pxe mnt

          sudo mount -o loop,ro "$ISO" mnt

          sudo cp mnt/images/pxeboot/vmlinuz release/pxe/vmlinuz
          sudo cp mnt/images/pxeboot/initrd.img release/pxe/initrd.img
          sudo cp mnt/LiveOS/squashfs.img release/pxe/squashfs.img

          sudo umount mnt
          sudo chown -R "$(id -u):$(id -g)" release

          cat > release/pxe/aurora-thinclient-live.ipxe <<'EOF'
          #!ipxe
          set base http://192.168.1.5/aurora-thinclient-live
          kernel ${base}/vmlinuz initrd=initrd.img root=live:${base}/squashfs.img rd.live.image rd.neednet=1 ip=dhcp plymouth.enable=0 rd.systemd.show_status=1 systemd.show_status=1
          initrd ${base}/initrd.img
          boot
          EOF

          (
            cd release/pxe
            sha256sum vmlinuz initrd.img squashfs.img aurora-thinclient-live.ipxe
          ) > release/aurora-thinclient-pxe.sha256

          ls -lh release/pxe release/

      - name: Publish PXE Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.PXE_RELEASE_TAG }}
          name: Aurora Thinclient Diskless PXE Live
          prerelease: true
          files: |
            ./release/pxe/vmlinuz
            ./release/pxe/initrd.img
            ./release/pxe/squashfs.img
            ./release/pxe/aurora-thinclient-live.ipxe
            ./release/aurora-thinclient-pxe.sha256
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Diskless PXE live image for Aurora Thinclient.

            Serve these files from an HTTP server:
              vmlinuz
              initrd.img
              squashfs.img
              aurora-thinclient-live.ipxe

            Edit aurora-thinclient-live.ipxe and replace:
              http://192.168.1.5/aurora-thinclient-live

            with your PXE HTTP server URL.
