name: bluebuild

on:
  push:
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"
  workflow_dispatch:
  schedule:
    - cron: '20 6 * * *'   # server + client + thinclient image builds
    - cron: '50 7 * * 0'   # thinclient ISO build + release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  image-changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.changes.outputs.server }}
      client: ${{ steps.changes.outputs.client }}
      thinclient: ${{ steps.changes.outputs.thinclient }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            server:
              - 'files/scripts/server/**'
              - 'files/scripts/shared/**'
              - 'recipes/recipe-server.yml'
              - '.github/workflows/build.yml'

            client:
              - 'files/scripts/client/**'
              - 'files/scripts/shared/**'
              - 'recipes/recipe-client.yml'
              - '.github/workflows/build.yml'

            thinclient:
              - 'files/scripts/thinclient/**'
              - 'recipes/recipe-thinclient.yml'
              - '.github/workflows/build.yml'

  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event.schedule == '20 6 * * *' ||
        needs.image-changes.outputs.server == 'true'
      )
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Server Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-server.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  build-client:
    name: Build Client Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event.schedule == '20 6 * * *' ||
        needs.image-changes.outputs.client == 'true'
      )
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Client Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-client.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  build-thinclient:
    name: Build Thinclient Image
    runs-on: ubuntu-latest
    needs: image-changes
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event.schedule == '20 6 * * *' ||
        needs.image-changes.outputs.thinclient == 'true'
      )
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Thinclient Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-thinclient.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  thinclient-iso:
    name: Build Thinclient ISO and publish Release
    runs-on: ubuntu-24.04
    needs: [image-changes, build-thinclient]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (
        github.event.schedule == '50 7 * * 0' ||
        needs.image-changes.outputs.thinclient == 'true'
      ) &&
      (
        github.event.schedule == '50 7 * * 0' ||
        needs.build-thinclient.result == 'success'
      )
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Write ISO config
        run: |
          set -euxo pipefail
          cat > image-config.toml <<'EOF'
          [customizations.kernel]
          append = "radeon.cik_support=1 amdgpu.cik_support=0 plymouth.enable=0 rd.systemd.show_status=1 systemd.show_status=1"
          EOF
          echo "=== image-config.toml ==="
          cat image-config.toml

      - name: Build ISO
        id: iso
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./image-config.toml
          image: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
          types: iso
          rootfs: xfs
          additional-args: --use-librepo=True

      - name: Prepare ISO for release
        run: |
          set -euxo pipefail
          echo "=== output directory contents before copy ==="
          sudo find "${{ steps.iso.outputs.output-directory }}" -maxdepth 3 -type f -ls

          iso=$(sudo find "${{ steps.iso.outputs.output-directory }}" -name '*.iso' | head -n1)
          echo "ISO found at: $iso"

          mkdir -p release
          sudo cp "$iso" ./release/aurora-thinclient-latest.iso
          sudo chown "$(id -u):$(id -g)" ./release/aurora-thinclient-latest.iso

          echo "=== iso size ==="
          ls -lh ./release/aurora-thinclient-latest.iso
          stat ./release/aurora-thinclient-latest.iso

      - name: Split ISO
        run: |
          set -euxo pipefail
          ISO=./release/aurora-thinclient-latest.iso

          split -b 1900M -d -a 2 "$ISO" "${ISO}.part-"
          sha256sum "${ISO}".part-* > "${ISO}.parts.sha256"

          echo "=== split files ==="
          ls -lh "${ISO}".part-* "${ISO}.parts.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-iso-latest
          name: Aurora Thinclient ISO
          prerelease: true
          files: |
            ./release/aurora-thinclient-latest.iso.part-*
            ./release/aurora-thinclient-latest.iso.parts.sha256
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest ISO image for Aurora Thinclient.

            Download and combine:
            base=https://github.com/n-a-m-e/Aurora/releases/download/thinclient-iso-latest/aurora-thinclient-latest.iso.part- && wget "$base"{00,01} && cat aurora-thinclient-latest.iso.part-* > aurora-thinclient-latest.iso

  thinclient-pxe-live:
    name: Build Thinclient Diskless PXE and publish Release
    runs-on: ubuntu-24.04
    needs: [image-changes, build-thinclient]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (
        github.event.schedule == '50 7 * * 0' ||
        needs.image-changes.outputs.thinclient == 'true'
      ) &&
      (
        github.event.schedule == '50 7 * * 0' ||
        needs.build-thinclient.result == 'success'
      )
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Install host tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y podman skopeo golang-go rsync xorriso
          sudo apt-get clean

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | sudo podman login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build image-builder with bootc-generic-iso support
        run: |
          set -euxo pipefail

          git clone https://github.com/osbuild/image-builder-cli.git
          cd image-builder-cli

          go mod edit -replace github.com/osbuild/images=github.com/ondrejbudai/images@bootc-generic-iso-dev
          GOPROXY=direct go mod tidy

          sudo podman build -t image-builder-dev .

      - name: Build Aurora thinclient live container
        run: |
          set -euxo pipefail

          sudo podman build \
            --cap-add SYS_ADMIN \
            --security-opt label=disable \
            --build-arg BASE_IMAGE="ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest" \
            -t aurora-thinclient-live \
            files/scripts/thinclient/pxe-live

      - name: Build live ISO from thinclient image
        run: |
          set -euxo pipefail

          mkdir -p output

          sudo podman run --rm --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$PWD/output:/output:Z" \
            image-builder-dev \
            build \
            --output-dir /output \
            --bootc-ref localhost/aurora-thinclient-live \
            --bootc-default-fs ext4 \
            bootc-generic-iso

          sudo chown -R "$(id -u):$(id -g)" output

          echo "=== output files ==="
          find output -maxdepth 3 -type f -ls

      - name: Extract PXE bundle
        run: |
          set -euxo pipefail

          ISO="$(find output -name '*.iso' | head -n1)"
          test -n "$ISO"

          mkdir -p release/pxe mnt iso-root

          sudo mount -o loop "$ISO" mnt
          rsync -a mnt/ iso-root/
          sudo umount mnt

          cp iso-root/images/pxeboot/vmlinuz release/pxe/vmlinuz
          cp iso-root/images/pxeboot/initrd.img release/pxe/initrd.img
          cp iso-root/LiveOS/squashfs.img release/pxe/squashfs.img

          cat > release/pxe/aurora-thinclient-live.ipxe <<'EOF'
          #!ipxe

          set base http://192.168.1.5/aurora-thinclient-live

          kernel ${base}/vmlinuz \
            initrd=initrd.img \
            root=live:${base}/squashfs.img \
            rd.live.image \
            rd.neednet=1 \
            ip=dhcp \
            radeon.cik_support=1 \
            amdgpu.cik_support=0 \
            plymouth.enable=0 \
            rd.systemd.show_status=1 \
            systemd.show_status=1

          initrd ${base}/initrd.img
          boot
          EOF

          sha256sum \
            release/pxe/vmlinuz \
            release/pxe/initrd.img \
            release/pxe/squashfs.img \
            release/pxe/aurora-thinclient-live.ipxe \
            > release/aurora-thinclient-pxe.sha256

          echo "=== PXE release files ==="
          ls -lh release/pxe release/

      - name: Publish PXE Live Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-pxe-live-latest
          name: Aurora Thinclient Diskless PXE Live
          prerelease: true
          files: |
            ./release/pxe/vmlinuz
            ./release/pxe/initrd.img
            ./release/pxe/squashfs.img
            ./release/pxe/aurora-thinclient-live.ipxe
            ./release/aurora-thinclient-pxe.sha256
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Diskless PXE live image for Aurora Thinclient.

            Serve these files from an HTTP server:
              vmlinuz
              initrd.img
              squashfs.img
              aurora-thinclient-live.ipxe

            Edit aurora-thinclient-live.ipxe and replace:
              http://192.168.1.5/aurora-thinclient-live

            with your PXE HTTP server URL.
