name: bluebuild
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build-server-client:
    name: Build Server and Client Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-server.yml
          - recipe-client.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
  thinclient-changes:
    name: Detect Thinclient Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      thinclient: ${{ steps.changes.outputs.thinclient }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            thinclient:
              - 'recipes/recipe-thinclient.yml'
              - 'files/scripts/thinclient-setup.sh'
              - '.github/workflows/build.yml'
  build-thinclient:
    name: Build Thinclient Image
    runs-on: ubuntu-latest
    needs: thinclient-changes
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || needs.thinclient-changes.outputs.thinclient == 'true')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Thinclient Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe-thinclient.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
  thinclient-raw:
    name: Build Thinclient RAW and publish Release
    runs-on: ubuntu-24.04
    needs: [thinclient-changes, build-thinclient]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || needs.thinclient-changes.outputs.thinclient == 'true')
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Write RAW config
        run: |
          cat > image-config.toml <<'EOF'
          [customizations]
          EOF
      - name: Build RAW
        id: raw
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./image-config.toml
          image: ghcr.io/${{ github.repository_owner }}/aurora-thinclient:latest
          types: raw
          rootfs: xfs
          additional-args: --use-librepo=True
      - name: Rename and compress RAW
        run: |
          raw=$(sudo find "${{ steps.raw.outputs.output-directory }}" -name '*.raw' | head -n1)
          sudo cp "$raw" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          sudo xz -T0 -z "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw"
          sudo chown "$(id -u):$(id -g)" "${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw.xz"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: thinclient-raw-latest
          name: Aurora Thinclient RAW
          prerelease: true
          files: ${{ steps.raw.outputs.output-directory }}/aurora-thinclient-latest.raw.xz
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Latest compressed RAW disk image for Aurora Thinclient.

            Write to USB with:
            xz -dc aurora-thinclient-latest.raw.xz | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync
