name: check-thinstation-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * 0"

jobs:
  check:
    name: Check ThinStation upstream
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Check upstream
        run: |
          chmod +x files/scripts/thinstation/check-upstream.sh
          files/scripts/thinstation/check-upstream.sh

      - name: Upload latest ref hint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thinstation-upstream-check
          path: |
            files/scripts/thinstation/THINSTATION_REF.latest
          if-no-files-found: ignore
