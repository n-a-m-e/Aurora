################################################
### Aurora ThinStation Build Config - ThinLinc ###
################################################
#
# Purpose:
#   PXE-booted ThinStation client for the same AMD/ATI-class hardware
#   as the previous ThinStation build, using ThinLinc only.
#
# Notes:
#   - VNC packages are intentionally not included.
#   - Old package names that no longer exist in ThinStation 7.2 were avoided.
#   - Keep this minimal first, then add packages back only when testing proves
#     they are needed.

################################################
### Machine / hardware modules
################################################

# Use explicit hardware modules from the older known-working config.
# If you later create a ThinStation 7.2 machine profile with hwlister,
# replace these module lines with:
#   machine <your-machine-name>

package xorg7
package xorg7-amdgpu

module amdgpu
module radeon
module r8169

module sd_mod
module usb-storage
module ahci
module libahci
module libata
module scsi_mod

module vfat
module ext4

module tpm_infineon
module tpm_tis
module tpm_tis_core
module tpm

module hp-wmi
module sparse-keymap
module rfkill
module amd_freq_sensitivity
module acpi-cpufreq
module kvm
module irqbypass
module crc32-pclmul
module crc32c-intel
module psmouse
module serio_raw
module fam15h_power
module k10temp
module sp5100_tco
module i2c-piix4
module input-leds
module shpchp
module parport_pc
module parport
module wmi
module overlay

# Sound modules kept from previous hardware config.
# Remove later if ThinLinc audio is not needed.
module snd-hda-codec-realtek
module snd-hda-codec-generic
module snd-hda-codec-hdmi
module snd-usb-audio
module snd-hda-intel
module snd-hda-codec
module snd-usbmidi-lib
module snd-rawmidi
module snd-hda-core
module snd-hwdep
module snd-seq-device
module snd-pcm
module snd-timer
module snd
module soundcore

################################################
### Packages
################################################

# Network/config retrieval
package autonet
package netfiles

# X/graphics
package xorg7
package xorg7-amdgpu
package xorg7-xinput

# ThinLinc client only.
package thinlinc

# Locale and fonts
package locale-en_US
package fonts-TTF-dejavu-sans
package fonts-TTF-liberation
package fonts-TTF-noto

# GUI/runtime dependencies commonly needed by ThinLinc/X clients.
# These are intentionally smaller than the old full desktop package set.
package gtk-2.0
package gtk-3.0
package gtk-theme-adwaita
package icons-cursor
package icons-hicolor
package icons-adwaita
package fontconfig
package pango
package gdk-pixbuf

# Certificates/crypto for secure connections.
package ca-certificates
package openssl

# Optional but useful for troubleshooting during early testing.
# Remove once the image is confirmed working.
package terminal

################################################
### Explicitly not included
################################################
#
# Do not include VNC packages:
#   package vncviewer
#   package xorg7vnc
#
# Do not include old/nonexistent names from older configs:
#   package fonts-TTF-BH
#   package xorg7-ati
#
# Do not include full local desktop/file-manager stack unless needed:
#   package xfwm4
#   package thunar
#   package geany

################################################
### Parameters
################################################

param fastboot       false
param tsuser         tsuser
param tsuserpasswd   pleasechangeme
param rootpasswd     pleasechangeme
param tsadminpasswd  pleasechangeme

param bootlogo       false
param splash         silent
param bootresolution 1920x1080-32

param defaultconfig  thinstation.conf.buildtime
param basename       thinstation
param basepath       ts7.2

param haltonerror    false
param hardlinkfs     true
param sametimestmp   true
param initrdcmd      "gzip"
param bootverbosity  63

# Keep firmware broad at first for the same unknown/varied hardware target.
# Once tested, this can be reduced for smaller images.
package alltimezone
param allres          true
param allfirmware     true
param earlymicrocode  false

# From previous config.
param blacklist "snd-pcsp.ko pcspkr.ko"
