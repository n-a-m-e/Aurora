label: "Aurora-Thinclient-Live"

grub2:
  timeout: 5
  entries:
    - name: "Aurora Thinclient Live"
      linux: "/images/pxeboot/vmlinuz root=live:CDLABEL=Aurora-Thinclient-Live rd.live.image rd.neednet=1 ip=dhcp plymouth.enable=0 rd.systemd.show_status=1 systemd.show_status=1"
      initrd: "/images/pxeboot/initrd.img"
