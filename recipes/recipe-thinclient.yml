# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: aurora-thinclient
description: Minimal Fedora bootc thinclient using Xorg, IceWM minimal session, xterm, ThinLinc, and Moonlight

base-image: quay.io/fedora/fedora-bootc
image-version: 43

modules:
  - type: dnf
    repos:
      files:
        - https://copr.fedorainfracloud.org/coprs/ferdiu/moonlight/repo/fedora-%OS_VERSION%/ferdiu-moonlight-fedora-%OS_VERSION%.repo
    install:
      packages:
        - ca-certificates
        - dbus-daemon
        - NetworkManager
        - greetd
        - xorg-x11-server-Xorg
        - xorg-x11-xinit
        - xorg-x11-xauth
        - xorg-x11-drv-libinput
        - xrandr
        - xset
        - icewm-minimal-session
        - xterm
        - moonlight-qt
        - https://github.com/n-a-m-e/Aurora-Files/releases/download/thinlinc-client-4.20.0-4284/thinlinc-client-4.20.0-4284.x86_64.rpm

  - type: script
    scripts:
      - thinclient/thinclient-setup.sh

  - type: script
    scripts:
      - thinclient/systemd-thinclient.sh

  - type: systemd
    system:
      enabled:
        - greetd.service
        - NetworkManager.service
        - thinclient-reset-home.service
        - thinclient-firstboot-admin.service

  - type: signing
