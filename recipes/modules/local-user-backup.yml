# recipes/modules/local-user-backup.yml
---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: files
    files:
      - source: modules/local-user-backup
        destination: /

  - type: script
    scripts:
      - modules/local-user-backup.sh

  - type: systemd
    system:
      enabled:
        - local-user-backup.service
