---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: rpm-ostree
    repos:
      - https://n-a-m-e.github.io/rpm-repo-sonicde/sonicde-fedora-%OS_VERSION%.repo
      - copr:copr.fedorainfracloud.org:group_xlibre:xlibre-xserver
    remove:
      # KWin replacement
      - kwin
      - kwin-common
      - kwin-libs

      # Plasma workspace replacement
      - plasma-workspace
      - plasma-workspace-common
      - plasma-workspace-libs

      # Plasma desktop shell replacement
      - plasma-desktop
      - plasma-desktop-doc

      # SonicDE runtime replacements
      - libplasma
      - kglobalacceld
      - libkscreen
      - kscreen
      - kscreenlocker
      - kinfocenter

      # Aurora/Fedora Plasma defaults likely tied to upstream Plasma
      - plasma-lookandfeel-fedora
      - plasma-setup
    install:
      - sonic-workspace
      - sonic-workspace-x11
      - sonic-win
      - sonic-desktop-interface
      - sonic-interface-libraries
      - sonic-keybind-daemon
      - sonic-screen
      - sonic-screen-library
      - sonic-screenlocker
      - sonic-system-info
      - sonic-silver-theme
