---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: rpm-ostree
    repos: []
    install:
      - vsftpd
      - docker

  - type: files
    files:
      - source: modules/shared-folder
        destination: /

  - type: script
    scripts:
      - modules/shared-folder/build.sh

  - type: systemd
    system:
      enabled:
        - vsftpd.service
        - shared-folder.timer
        - node-server.service
