---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: aurora-server
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/aurora
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # Replace Plasma/KWin with LXQt + xfwm4
  - type: rpm-ostree
    install:
      - lxqt-panel
      - lxqt-config
      - lxqt-globalkeys
      - lxqt-notificationd
      - lxqt-powermanagement
      - lxqt-qtplugin
      - lxqt-runner
      - lxqt-sudo
      - lxqt-about
      - xfwm4
      - xfconf
      - variety
      - pavucontrol-qt
      - nm-connection-editor
      - network-manager-applet
      - system-config-printer
      - firewall-config
      - qps
      - sddm
      - sddm-conf
      - sddm-themes
      - xorg-x11-server-Xorg
    remove:
      - kwin
      - kwin-common
      - kwin-libs
      - plasma-browser-integration
      - plasma-desktop
      - plasma-desktop-doc
      - plasma-disks
      - plasma-drkonqi
      - plasma-firewall
      - plasma-firewall-firewalld
      - plasma-keyboard
      - plasma-login-manager
      - plasma-lookandfeel-fedora
      - plasma-milou
      - plasma-nm
      - plasma-nm-openconnect
      - plasma-nm-openvpn
      - plasma-nm-vpnc
      - plasma-pa
      - plasma-print-manager
      - plasma-print-manager-libs
      - plasma-setup
      - plasma-systemmonitor
      - plasma-thunderbolt
      - plasma-vault
      - plasma-wallpapers-dynamic
      - plasma-wallpapers-dynamic-builder
      - plasma-wallpapers-dynamic-builder-bash-completion
      - plasma-wallpapers-dynamic-builder-fish-completion
      - plasma-wallpapers-dynamic-builder-zsh-completion
      - plasma-welcome
      - plasma-workspace
      - plasma-workspace-libs
      - plasma-workspace-wallpapers
      - powerdevil
      - kcm-plasma-keyboard
      - kde-settings-plasmalogin
      - kcm-plasmalogin
  - type: script
    scripts:
      - server/replace-plasma-with-lxqt-xfwm4.sh
  - type: systemd
    system:
      enabled:
        - sddm.service

  - type: rpm-ostree
    repos: []
    install:
      - qpdf
      - konsole
      - yakuake
      - flatpak-builder
      - inotify-tools
      - pam-kwallet
      - docker
      - vsftpd
      - python3-tkinter
      # for printers.
      - poppler-glib
      - systemd-devel
      - tinyxml
    remove:
      - kdeconnectd
      - kde-connect-libs
      - kde-connect
      - input-remapper
      - kdebugsettings

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install: []

  - type: script
    scripts:
      - shared/konsole.sh
  - type: script
    scripts:
      - server/thinlinc-server.sh
  - type: script
    scripts:
      - server/printers.sh
  - type: script
    scripts:
      - server/systemd-server.sh
  - type: script
    scripts:
      - server/uivision.sh
  - type: script
    scripts:
      - server/umask.sh
  - type: script
    scripts:
      - server/kde-config.sh
  - type: script
    scripts:
      - shared/bluebuild-cleanup.sh

  - type: systemd
    system:
      enabled:
        - thinlinc-remove-symlink.service
        - vsmserver.service
        - vsmagent.service
        - tlwebaccess.service
        - tlwebadm.service
        - sshd.service
        #- vikunja-start.service
        - flatpak-native-messaging-hosts.service
        - shared-folder.service
        - shared-folder.timer
        - flatpak-force-x11.service
        - node-server.service
        #- pihole.service
        #- restic-backup.service
        #- restic-backup.timer
        - vsftpd.service
        #- install-davinci-resolve.service
        - manage-kargs.service
        - remote-shutdown.service
      disabled:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

    user:
      enabled: []
      disabled: []

  - type: signing
