---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: aurora-server
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: rpm-ostree
    repos: []
    install:
      - qpdf
      - konsole
      - yakuake
      - inotify-tools
      - pam-kwallet
    remove:
      - kdeconnectd
      - kde-connect-libs
      - kde-connect
      - input-remapper
      - kdebugsettings

  - type: script
    scripts:
      - shared/konsole.sh
      - server/uivision.sh
      - server/kde-config.sh

  - from-file: modules/local-user-backup.yml
  - from-file: modules/remote-shutdown.yml
  - from-file: modules/thinlinc.yml
  - from-file: modules/shared-folder.yml
  - from-file: modules/vikunja.yml
  - from-file: modules/printers.yml
  - from-file: modules/flatpak.yml
  - from-file: modules/network.yml
  - from-file: modules/sonic.yml

  - type: script
    scripts:
      - shared/bluebuild-cleanup.sh

  - type: systemd
    system:
      enabled: []
        #- restic-backup.service
        #- restic-backup.timer
      disabled:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

  - type: signing
