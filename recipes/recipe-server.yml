---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: aurora-server
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/aurora
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - from-file: modules/local-user-backup.yml
  - from-file: modules/lxqt.yml

  - type: rpm-ostree
    repos: []
    install:
      - qpdf
      - konsole
      - yakuake
      - flatpak-builder
      - inotify-tools
      - pam-kwallet
      - docker
      - vsftpd
      - python3-tkinter
      # for printers.
      - poppler-glib
      - systemd-devel
      - tinyxml
    remove:
      - kdeconnectd
      - kde-connect-libs
      - kde-connect
      - input-remapper
      - kdebugsettings

  - type: script
    scripts:
      - shared/konsole.sh
  - type: script
    scripts:
      - server/thinlinc-server.sh
  - type: script
    scripts:
      - server/printers.sh
  - type: script
    scripts:
      - server/systemd-server.sh
  - type: script
    scripts:
      - server/uivision.sh
  - type: script
    scripts:
      - server/umask.sh
  - type: script
    scripts:
      - server/kde-config.sh
  - type: script
    scripts:
      - shared/bluebuild-cleanup.sh

  - type: systemd
    system:
      enabled:
        - thinlinc-remove-symlink.service
        - vsmserver.service
        - vsmagent.service
        - tlwebaccess.service
        - tlwebadm.service
        - sshd.service
        #- vikunja-start.service
        - flatpak-native-messaging-hosts.service
        - shared-folder.service
        - shared-folder.timer
        - flatpak-force-x11.service
        - node-server.service
        #- pihole.service
        #- restic-backup.service
        #- restic-backup.timer
        - vsftpd.service
        #- install-davinci-resolve.service
        - manage-kargs.service
      disabled:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

    user:
      enabled: []
      disabled: []

  - type: signing
